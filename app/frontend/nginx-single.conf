# nginx-single.conf
# nginx listens on port 8080 (not 80) so the container can run as non-root.
# /api/ requests are proxied to uvicorn on localhost:8000.

# Rate limiting zones — defined at http block level via the include below.
# We limit login attempts and API writes to protect against brute force.
# Note: these directives need to be in the http block; nginx in Alpine puts
# the main http block in nginx.conf, so we use map/limit_req_zone via a
# separate include. For the single-file approach, we just use what we can here.

server {
    listen 8080;

    # ── Security headers ────────────────────────────────────────────────────
    # These are set at the nginx level so they apply to every response,
    # including static files served by nginx that never touch FastAPI.

    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "SAMEORIGIN"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy for the React frontend.
    # - default-src 'self': only load resources from same origin
    # - script-src 'self' 'unsafe-inline': React needs inline scripts (build artefact)
    # - style-src 'self' 'unsafe-inline': React inlines styles
    # - img-src 'self' data: blob:: thumbnails are served from same origin; data: for QR codes
    # - connect-src 'self': XHR/fetch only to same origin
    # - frame-ancestors 'none': no embedding in iframes anywhere
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none';"
        always;

    # Strict-Transport-Security — only has effect when served over HTTPS
    # (your reverse proxy should set this, but belt-and-suspenders)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Temp paths writable by non-root appuser
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path        /tmp/nginx/proxy_temp;
    fastcgi_temp_path      /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path        /tmp/nginx/uwsgi_temp;
    scgi_temp_path         /tmp/nginx/scgi_temp;

    # ── Upload size ──────────────────────────────────────────────────────────
    # Matches the backend's MAX_PDF_BYTES limit. nginx rejects oversized
    # requests before they even reach FastAPI, saving CPU and bandwidth.
    client_max_body_size 52M;

    # Serve the compiled React app
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Don't expose the backend's server header
        proxy_hide_header  Server;

        # Timeouts for large uploads and PDF conversions
        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
    }

    # ── Static React app ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (they have content hashes in filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Re-add security headers since location blocks inherit but add_header
            # doesn't merge — we only need the ones relevant to static assets
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ── Hide nginx version from error pages and Server header ─────────────────
    server_tokens off;
}
