# nginx-single.conf
# nginx listens on port 8080 (not 80) so the container can run as non-root.
# /api/ requests are proxied to uvicorn on localhost:8000.

server {
    listen 8080;

    # Temp paths writable by non-root appuser
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path        /tmp/nginx/proxy_temp;
    fastcgi_temp_path      /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path        /tmp/nginx/uwsgi_temp;
    scgi_temp_path         /tmp/nginx/scgi_temp;

    # Serve the compiled React app
    root /usr/share/nginx/html;
    index index.html;

    # Forward all /api/ requests to the uvicorn backend on localhost
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Allow large file uploads (up to 100MB)
        client_max_body_size 100M;
        # Increase timeouts for large uploads and PDF conversions
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # All other requests serve the React app (needed for client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
