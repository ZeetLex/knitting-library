# nginx.conf
# This configures the web server that serves the frontend.
# It also forwards any /api/ requests to the backend container.

server {
    listen 80;

    # Serve the React frontend files
    root /usr/share/nginx/html;
    index index.html;

    # All requests to /api/ are forwarded to the Python backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Allow large file uploads (up to 100MB)
        client_max_body_size 100M;
        # Increase timeouts for large uploads
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # All other requests serve the React app
    # This is needed so that page refreshes work correctly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
