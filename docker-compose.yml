# docker-compose.yml
#
# Starts the knitting library as a single container.
# The image contains both the React frontend (served by nginx)
# and the Python backend (run by uvicorn), managed by supervisord.
#
# Usage:
#   docker-compose up --build      (first time or after updates)
#   docker-compose up -d           (start in background)
#   docker-compose down            (stop)
#
# Your data (recipes, yarns, database) is stored in ./data
# and persists across restarts and updates.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zeetlex/knitting-library:latest
    container_name: knitting-library
    restart: unless-stopped
    ports:
      # Change 3000 to any port you prefer, e.g. "8080:80"
      - "3000:80"
    volumes:
      # All data lives here — recipes, yarn images, and the database.
      # Back up by copying this folder.
      - ./data:/data
