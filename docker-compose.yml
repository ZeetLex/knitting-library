# docker-compose.yml
#
# Starts the knitting library as a single container.
# The image contains both the React frontend (served by nginx)
# and the Python backend (run by uvicorn), managed by supervisord.
#
# Usage:
#   docker-compose pull            (download latest image from Docker Hub)
#   docker-compose up -d           (start in background)
#   docker-compose down            (stop)
#
# To update to a newer version:
#   docker-compose down && docker-compose pull && docker-compose up -d
#
# Your data (recipes, yarns, database) is stored in ./data
# and persists across restarts and updates.

services:
  app:
    image: zeetlex/knitting-library:beta
    container_name: knitting-library
    user: root   # overrides Dockerfile USER so entrypoint.sh can chown /data; supervisord then runs nginx+uvicorn as appuser
    restart: unless-stopped
    ports:
      # Change 3000 to any port you prefer, e.g. "8888:8080"
      # nginx now runs on 8080 internally (non-root — no port 80 privilege needed)
      - "3000:8080"
    volumes:
      # All data lives here — recipes, yarn images, and the database.
      # Back up by copying this folder.
      - ./data:/data
