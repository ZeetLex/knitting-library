# docker-compose.yml
#
# Usage:
#   docker-compose up -d           — start
#   docker-compose down            — stop
#   docker-compose pull            — download latest image
#
# To update:
#   docker-compose down && docker-compose pull && docker-compose up -d
#
# Data (recipes, yarns, database) is stored in ./data and persists across updates.
# Logs are stored in ./logs
#
# PUID / PGID: files written to ./data and ./logs will be owned by this uid/gid
# on the host. Unraid default is 99/100. Linux: check with: id YOUR_USERNAME
# Windows/Mac Docker Desktop: set to 0 or remove these lines.

services:
  app:
    image: zeetlex/knitting-library:latest
    container_name: knitting-library
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      # Comma-separated proxy IPs/CIDRs whose X-Forwarded-For and X-Forwarded-Proto
      # headers should be trusted. Leave empty when accessing the app directly.
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    volumes:
      - ./data:/data
      - ./logs:/logs
